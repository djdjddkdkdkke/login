<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ALI EFFECT - رعد طويل مستقيم</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0a0a1a, #000000);
  overflow: hidden;
  font-family: 'Arial', sans-serif;
}

/* النص */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ff44cc;
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 0 20px #ff00aa, 0 0 40px #ff44cc;
  z-index: 10;
  background: rgba(0,0,0,0.6);
  padding: 15px 30px;
  border-radius: 50px;
  backdrop-filter: blur(5px);
  white-space: nowrap;
  letter-spacing: 2px;
  font-family: 'Arial', sans-serif;
}

/* الرعد الطويل المستقيم جدًا */
.lightning {
  position: absolute;
  top: -200px;
  width: 12px;
  background: linear-gradient(180deg, 
    rgba(255,255,255,0.9) 0%,
    #ffffff 15%,
    #ff44aa 40%,
    #00ffff 70%,
    rgba(255,255,255,0.8) 100%);
  box-shadow: 0 0 25px #ff44aa, 0 0 50px #00ffff, 0 0 10px white;
  opacity: 0.95;
  animation: fallSlow linear forwards, glowPulse 0.3s ease-in-out infinite;
  border-radius: 20px;
  pointer-events: none;
}

/* تفرعات جانبية بسيطة تجعلها أكثر واقعية */
.lightning::before {
  content: "";
  position: absolute;
  top: 25%;
  left: -18px;
  width: 8px;
  height: 40px;
  background: inherit;
  border-radius: 10px;
  transform: rotate(-40deg);
  box-shadow: inherit;
  filter: blur(2px);
}

.lightning::after {
  content: "";
  position: absolute;
  bottom: 20%;
  right: -18px;
  width: 8px;
  height: 50px;
  background: inherit;
  border-radius: 10px;
  transform: rotate(35deg);
  box-shadow: inherit;
  filter: blur(2px);
}

/* حركة بطيئة جدًا - سلو موشن */
@keyframes fallSlow {
  0% {
    transform: translateY(-15vh);
    opacity: 0.9;
  }
  100% {
    transform: translateY(120vh);
    opacity: 0;
  }
}

/* وميض بطيء وناعم */
@keyframes glowPulse {
  0% { 
    opacity: 0.85;
    box-shadow: 0 0 20px #ff44aa, 0 0 40px #00ffff;
  }
  50% { 
    opacity: 1;
    box-shadow: 0 0 40px #ff88ff, 0 0 80px #44ffff;
  }
  100% { 
    opacity: 0.85;
    box-shadow: 0 0 20px #ff44aa, 0 0 40px #00ffff;
  }
}
</style>
</head>

<body>

<div class="text">⚡ علينه بس يا ليت ⚡</div>

<audio autoplay loop>
  <source src="login/song.mp3" type="audio/mpeg">
</audio>

<script>
function createLightning() {
  const l = document.createElement("div");
  l.classList.add("lightning");

  // مكان عشوائي أفقي
  l.style.left = Math.random() * 100 + "vw";
  
  // طول طويل جدًا (من 500 إلى 800 بكسل)
  const h = 500 + Math.random() * 300;
  l.style.height = h + "px";
  
  // سرعة بطيئة جدًا (سلو موشن) من 6 إلى 10 ثواني
  const duration = 6 + Math.random() * 4;
  l.style.animationDuration = duration + "s";
  
  // سماكة واضحة وكبيرة
  const thickness = 10 + Math.random() * 8;
  l.style.width = thickness + "px";
  
  // ميل بسيط جدًا للحفاظ على الاستقامة العامة
  const tilt = -3 + Math.random() * 6;
  l.style.transform = `rotate(${tilt}deg)`;
  
  document.body.appendChild(l);
  
  // إزالة العنصر بعد انتهاء الحركة
  setTimeout(() => {
    if (l && l.remove) l.remove();
  }, duration * 1000);
}

// إنشاء رعد كل 400 مللي ثانية (متباعد لتأثير درامي)
setInterval(createLightning, 400);

// إطلاق رعود عند تحميل الصفحة
window.addEventListener('load', () => {
  for(let i = 0; i < 4; i++) {
    setTimeout(createLightning, i * 150);
  }
});
</script>

</body>
</html></audio>

<script>
function createLightning() {
  const l = document.createElement("div");
  l.classList.add("lightning");

  // مكان عشوائي أفقي
  l.style.left = Math.random() * 100 + "vw";
  
  // طول متنوع بين 150 و 350 بكسل
  const h = 150 + Math.random() * 200;
  l.style.height = h + "px";
  
  // سرعة هادئة بين 2.5 و 5 ثواني
  const duration = 2.5 + Math.random() * 2.5;
  l.style.animationDuration = duration + "s";
  
  // سماكة متغيرة بسيطة
  const thickness = 6 + Math.random() * 8;
  l.style.width = thickness + "px";
  
  // إضافة زاوية ميل بسيطة جداً عشان الحركة طبيعية
  const tilt = -5 + Math.random() * 10;
  l.style.transform = `rotate(${tilt}deg)`;
  
  document.body.appendChild(l);
  
  // إزالة العنصر بعد انتهاء الحركة
  setTimeout(() => {
    if (l && l.remove) l.remove();
  }, duration * 1000);
}

// إنشاء رعد كل 250 مللي ثانية (أقل كثافة)
setInterval(createLightning, 250);

// إضافة تأثير عند تحميل الصفحة
window.addEventListener('load', () => {
  // إطلاق 3 رعود فورية
  for(let i = 0; i < 3; i++) {
    setTimeout(createLightning, i * 100);
  }
});
</script>

</body>
</html>
