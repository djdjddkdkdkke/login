<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Love Forever</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>

body {
  background: #000;
  height: 100vh;
  margin: 0;
  overflow: hidden;
  font-family: system-ui;
}

/* القلب */
#ui {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 450px;
  height: 450px;
  transform: translate(-50%, -50%);
}

#ui .love {
  position: absolute;
  top: 0;
  left: 0;
  --i: 1;
}

#ui .love_word {
  color: #ea80b0;
  font-size: 1.4rem;
  transform: translateY(-100%) rotateZ(-30deg);
  text-shadow: 0 0 10px #fff;
  letter-spacing: 2px;
  white-space: nowrap;
}

#ui .love_horizontal {
  animation: horizontal 10000ms infinite alternate ease-in-out;
  animation-delay: calc(var(--i) * -300ms);
}

#ui .love_vertical {
  animation: vertical 20000ms infinite linear;
  animation-delay: calc(var(--i) * -300ms);
}

/* النص داخل القلب */
.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 70%;
  transform: translate(-50%, -50%);
  color: #fff;
  text-align: center;
  font-size: 1.2rem;
  line-height: 1.8;
  text-shadow: 0 0 15px #ea80b0;
  pointer-events: none;
}

/* نفس انيميشنك */
@keyframes horizontal {
  from { transform: translateX(0px); }
  to   { transform: translateX(450px); }
}

@keyframes vertical {
  0%   { transform: translateY(180px); }
  10%  { transform: translateY(45px); }
  15%  { transform: translateY(4.5px); }
  18%  { transform: translateY(0px); }
  20%  { transform: translateY(4.5px); }
  22%  { transform: translateY(34.6px); }
  24%  { transform: translateY(64px); }
  25%  { transform: translateY(112px); }
  26%  { transform: translateY(64px); }
  28%  { transform: translateY(34px); }
  30%  { transform: translateY(4px); }
  32%  { transform: translateY(0px); }
  35%  { transform: translateY(4px); }
  40%  { transform: translateY(45px); }
  50%  { transform: translateY(180px); }
  71%  { transform: translateY(428px); }
  75%  { transform: translateY(450px); }
  79%  { transform: translateY(428px); }
  100% { transform: translateY(180px); }
}

</style>
</head>

<body>

<div id="ui">

  <div class="center-text">
    My brothers : <br>
    @VV66Vl | @GNGGD <br>
    @Fahid_501 | @yha245 <br>
    @n7rb2y | @RQ12sa
  </div>

</div>

<script>
const N = 100;
const ui = document.getElementById('ui');

for (let i = 1; i <= N; i++) {
  const love = document.createElement('div');
  love.className = 'love';
  love.style.setProperty('--i', i);

  const h = document.createElement('div');
  h.className = 'love_horizontal';

  const v = document.createElement('div');
  v.className = 'love_vertical';

  const word = document.createElement('div');
  word.className = 'love_word';
  word.textContent = 'I love you';

  v.appendChild(word);
  h.appendChild(v);
  love.appendChild(h);
  ui.appendChild(love);
}
</script>

</body>
</html>
