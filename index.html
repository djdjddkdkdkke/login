<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ALI EFFECT - الرمح المستقيم</title>

<style>
body {
  margin: 0;
  background: #000000;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
}

/* النص */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ff44cc;
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 0 20px #ff00aa, 0 0 40px #ff44cc;
  z-index: 10;
  background: rgba(0,0,0,0.7);
  padding: 15px 30px;
  border-radius: 50px;
  backdrop-filter: blur(5px);
  white-space: nowrap;
  letter-spacing: 2px;
  pointer-events: none;
  font-family: 'Arial', sans-serif;
}

/* الرعد مثل الرمح - مستقيم جدًا بدون تفرعات */
.spear {
  position: absolute;
  top: -300px;
  background: linear-gradient(180deg, 
    #ffffff 0%,
    #ffdd88 20%,
    #ff44aa 50%,
    #00ccff 80%,
    #ffffff 100%);
  box-shadow: 0 0 35px #ff44aa, 0 0 70px #00ccff, 0 0 15px #ffffff;
  opacity: 0.98;
  animation: fallSmooth linear forwards;
  border-radius: 30px;
  pointer-events: none;
  will-change: transform;
}

/* لا يوجد تفرعات جانبية - شكل رمح نقي */

/* حركة سلسة */
@keyframes fallSmooth {
  0% {
    transform: translateY(-15vh);
    opacity: 1;
  }
  100% {
    transform: translateY(115vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="text">⚡ علينه بس يا ليت ⚡</div>

<audio autoplay loop>
  <source src="login/song.mp3" type="audio/mpeg">
</audio>

<script>
let activeSpears = 0;
const MAX_SPEARS = 6;

function createSpear() {
  if (activeSpears >= MAX_SPEARS) return;
  
  const s = document.createElement("div");
  s.classList.add("spear");

  // مكان عشوائي أفقي
  s.style.left = Math.random() * 100 + "vw";
  
  // طول الرمح: طويل جدًا مثل الرمح الحقيقي
  const h = 600 + Math.random() * 300;
  s.style.height = h + "px";
  
  // عرض الرمح: رفيع مثل الرمح
  const thickness = 6 + Math.random() * 4;
  s.style.width = thickness + "px";
  
  // سرعة سلو موشن
  const duration = 6 + Math.random() * 3;
  s.style.animationDuration = duration + "s";
  
  // مستقيم تمامًا بدون ميل
  s.style.transform = "rotate(0deg)";
  
  activeSpears++;
  
  s.addEventListener('animationend', () => {
    if (s && s.remove) {
      s.remove();
      activeSpears--;
    }
  });
  
  document.body.appendChild(s);
}

// إنشاء الرمح كل 400 مللي
setInterval(createSpear, 400);

// بداية فورية
setTimeout(() => {
  createSpear();
  setTimeout(createSpear, 150);
  setTimeout(createSpear, 350);
}, 100);
</script>

</body>
</html>
