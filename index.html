<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Forever</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin: 0;
  height: 100vh;
  background: #000;
  overflow: hidden;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
}

#ui {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 450px;
  height: 450px;
  transform: translate(-50%, -50%);
  animation: floatHeart 6s ease-in-out infinite alternate;
}

#ui .love {
  position: absolute;
  top: 0;
  left: 0;
  --i: 1;
}

#ui .love_word {
  color: #ff69b4;
  font-size: 1.4rem;
  transform: translateY(-100%) rotateZ(-30deg);
  text-shadow: 0 0 10px #ff80bf;
  letter-spacing: 2px;
  white-space: nowrap;
}

#ui .love_horizontal {
  animation: horizontal 10000ms infinite alternate ease-in-out;
  animation-delay: calc(var(--i) * -300ms);
}

#ui .love_vertical {
  animation: vertical 20000ms infinite linear;
  animation-delay: calc(var(--i) * -300ms);
}

.center-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: #fff;
  font-size: 1.2rem;
  line-height: 1.8;
  text-shadow: 0 0 20px #ff69b4;
  pointer-events: none;
  animation: textGlow 2s ease-in-out infinite alternate;
}

/* Heart floating */
@keyframes floatHeart {
  0% { transform: translate(-52%, -48%) rotate(-1deg); }
  50% { transform: translate(-48%, -52%) rotate(2deg); }
  100% { transform: translate(-50%, -50%) rotate(-1deg); }
}

/* Text glow effect */
@keyframes textGlow {
  0% { text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493; }
  50% { text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff1493; }
  100% { text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493; }
}

@keyframes horizontal {
  from { transform: translateX(0px); }
  to { transform: translateX(450px); }
}

@keyframes vertical {
  0%   { transform: translateY(180px); }
  50%  { transform: translateY(450px); }
  100% { transform: translateY(180px); }
}

</style>
</head>
<body>

<div id="ui">

  <div class="center-text">
    My brothers : <br>
    @VV66Vl | @GNGGD <br>
    @Fahid_501 | @yha245 <br>
    @n7rb2y | @RQ12sa
  </div>

</div>

<script>
const N = 100;
const ui = document.getElementById('ui');

for (let i = 1; i <= N; i++) {
  const love = document.createElement('div');
  love.className = 'love';
  love.style.setProperty('--i', i);

  const h = document.createElement('div');
  h.className = 'love_horizontal';

  const v = document.createElement('div');
  v.className = 'love_vertical';

  const word = document.createElement('div');
  word.className = 'love_word';
  word.textContent = 'I love you';

  v.appendChild(word);
  h.appendChild(v);
  love.appendChild(h);
  ui.appendChild(love);
}
</script>

</body>
</html>
