<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ALI EFFECT</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* النص */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ff00aa;
  font-size: 30px;
  font-weight: bold;
  z-index: 10;
}

/* شكل الرعد */
.lightning {
  position: absolute;
  top: -200px;
  width: 2px;
  height: 120px;
  background: linear-gradient(to bottom, transparent, #fff, #ff00aa, #00ffff, transparent);
  opacity: 0.9;
  animation: fall linear forwards, flicker 0.2s infinite;
  box-shadow: 0 0 10px #ff00aa, 0 0 20px #00ffff;
}

/* نزول */
@keyframes fall {
  0% {
    transform: translateY(-10vh);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh);
    opacity: 0;
  }
}

/* وميض رعد */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<div class="text">علينه بس يا ليت</div>

<audio autoplay loop>
  <source src="login/song.mp3" type="audio/mpeg">
</audio>

<script>
function createLightning() {
  const l = document.createElement("div");
  l.classList.add("lightning");

  // مكان عشوائي
  l.style.left = Math.random() * 100 + "vw";

  // طول عشوائي
  const height = 80 + Math.random() * 200;
  l.style.height = height + "px";

  // سرعة مختلفة (سلو موشن)
  l.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(l);

  setTimeout(() => {
    l.remove();
  }, 5000);
}

setInterval(createLightning, 150);
</script>

</body>
</html>
