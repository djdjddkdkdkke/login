<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ALI EFFECT</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  text-align: center;
  font-family: Arial;
}

/* النص */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ff00aa;
  font-size: 30px;
  font-weight: bold;
  z-index: 10;
}

/* السهم */
.arrow {
  position: absolute;
  top: -50px;
  font-size: 20px;
  opacity: 0.9;
  animation: fall linear forwards;
  filter: drop-shadow(0 0 6px #ff00aa);
}

/* حركة النزول */
@keyframes fall {
  0% {
    transform: translateY(-10vh) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0.2;
  }
}
</style>
</head>

<body>

<div class="text">علينه بس يا ليت</div>

<audio autoplay loop>
  <source src="login/song.mp3" type="audio/mpeg">
</audio>

<script>
function createArrow() {
  const arrow = document.createElement("div");
  arrow.classList.add("arrow");

  // شكل السهم + قلوب + رموز
  const shapes = ["➤", "➜", "➤", "➤", "➵", "➸", "♥"];

  arrow.innerHTML = shapes[Math.floor(Math.random() * shapes.length)];

  // مكان عشوائي
  arrow.style.left = Math.random() * 100 + "vw";

  // حجم عشوائي
  arrow.style.fontSize = (10 + Math.random() * 25) + "px";

  // مدة الحركة (سلو موشن)
  arrow.style.animationDuration = (3 + Math.random() * 4) + "s";

  // ألوان متغيرة (وردي + RGB)
  const colors = ["#ff00aa", "#ff66cc", "#ff3399", "#ff99dd", "#00ffff", "#ffff00"];
  arrow.style.color = colors[Math.floor(Math.random() * colors.length)];

  document.body.appendChild(arrow);

  setTimeout(() => {
    arrow.remove();
  }, 7000);
}

setInterval(createArrow, 200);
</script>

</body>
</html>
