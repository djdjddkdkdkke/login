<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ALI EFFECT - رعد مستقيم</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0a0f1e, #000000);
  overflow: hidden;
  font-family: 'Arial', sans-serif;
}

/* النص */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ff44cc;
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 0 20px #ff00aa, 0 0 40px #ff44cc;
  z-index: 10;
  background: rgba(0,0,0,0.5);
  padding: 15px 30px;
  border-radius: 50px;
  backdrop-filter: blur(5px);
  white-space: nowrap;
  letter-spacing: 2px;
}

/* شكل الرعد المستقيم */
.lightning {
  position: absolute;
  top: -100px;
  width: 8px;
  background: linear-gradient(180deg, 
    rgba(255,255,255,0) 0%,
    #ffffff 20%,
    #ff44aa 50%,
    #00ffff 80%,
    rgba(255,255,255,0) 100%);
  box-shadow: 0 0 20px #ff44aa, 0 0 40px #00ffff, 0 0 8px white;
  opacity: 0.95;
  animation: fall linear forwards, pulse 0.2s ease-in-out infinite;
  border-radius: 10px;
  pointer-events: none;
}

/* إضافة تأثير تفرعات جانبية بسيطة باستخدام before/after */
.lightning::before {
  content: "";
  position: absolute;
  top: 30%;
  left: -12px;
  width: 6px;
  height: 25px;
  background: inherit;
  border-radius: 5px;
  transform: rotate(-45deg);
  box-shadow: inherit;
  filter: blur(1px);
}

.lightning::after {
  content: "";
  position: absolute;
  bottom: 25%;
  right: -12px;
  width: 6px;
  height: 35px;
  background: inherit;
  border-radius: 5px;
  transform: rotate(35deg);
  box-shadow: inherit;
  filter: blur(1px);
}

/* حركة السقوط */
@keyframes fall {
  0% {
    transform: translateY(-15vh);
    opacity: 0.8;
  }
  100% {
    transform: translateY(115vh);
    opacity: 0;
  }
}

/* وميض سريع */
@keyframes pulse {
  0% { opacity: 0.8; box-shadow: 0 0 15px #ff44aa, 0 0 30px #00ffff; }
  100% { opacity: 1; box-shadow: 0 0 30px #ff88ff, 0 0 60px #44ffff; }
}
</style>
</head>

<body>

<div class="text">⚡ علينه بس يا ليت ⚡</div>

<audio autoplay loop>
  <source src="login/song.mp3" type="audio/mpeg">
  <!-- إذا الملف ما اشتغل، ما راح يظهر خطأ -->
</audio>

<script>
function createLightning() {
  const l = document.createElement("div");
  l.classList.add("lightning");

  // مكان عشوائي أفقي
  l.style.left = Math.random() * 100 + "vw";
  
  // طول متنوع بين 150 و 350 بكسل
  const h = 150 + Math.random() * 200;
  l.style.height = h + "px";
  
  // سرعة هادئة بين 2.5 و 5 ثواني
  const duration = 2.5 + Math.random() * 2.5;
  l.style.animationDuration = duration + "s";
  
  // سماكة متغيرة بسيطة
  const thickness = 6 + Math.random() * 8;
  l.style.width = thickness + "px";
  
  // إضافة زاوية ميل بسيطة جداً عشان الحركة طبيعية
  const tilt = -5 + Math.random() * 10;
  l.style.transform = `rotate(${tilt}deg)`;
  
  document.body.appendChild(l);
  
  // إزالة العنصر بعد انتهاء الحركة
  setTimeout(() => {
    if (l && l.remove) l.remove();
  }, duration * 1000);
}

// إنشاء رعد كل 250 مللي ثانية (أقل كثافة)
setInterval(createLightning, 250);

// إضافة تأثير عند تحميل الصفحة
window.addEventListener('load', () => {
  // إطلاق 3 رعود فورية
  for(let i = 0; i < 3; i++) {
    setTimeout(createLightning, i * 100);
  }
});
</script>

</body>
</html>
