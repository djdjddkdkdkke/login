<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ALI EFFECT</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  text-align: center;
  font-family: Arial;
}

.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ff00aa;
  font-size: 30px;
  font-weight: bold;
}

.heart {
  position: absolute;
  color: #ff00aa;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {
    transform: translateY(-10vh);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="text">علينه بس يا ليت</div>

<audio autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "♥";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  heart.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 100);
</script>

</body>
</html>
